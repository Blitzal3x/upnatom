<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Admin – Up N Atom</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="supabase.js"></script>
</head>

<body>

<header class="header">
  <div class="logo">Up N Atom</div>
  <nav>
    <a href="index.html">Startseite</a>
    <a href="apply.html">Bewerben</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<section class="content container">
  <h2>Admin Login</h2>

  <div class="card">
    <input type="password" id="code" placeholder="Zugangscode">
    <button id="loginBtn">Login</button>
  </div>

  <div id="adminPanel" style="display:none;">
    <h3>Eingegangene Bewerbungen</h3>

    <table>
      <tr>
        <th>Name</th>
        <th>E-Mail</th>
        <th>Motivation</th>
      </tr>
    </table>
  </div>
</section>

<script type="module">
  import { supabase } from './supabase.js';

  const ADMIN_CODE = "2026UPNATOM";

  document.getElementById("loginBtn").onclick = async () => {
    const code = document.getElementById("code").value;

    if (code !== ADMIN_CODE) {
      alert("Falscher Zugangscode");
      return;
    }

    document.getElementById("adminPanel").style.display = "block";

    const { data, error } = await supabase
      .from("applications")
      .select("*");

    if (error) {
      alert("Fehler beim Laden");
      return;
    }

    const table = document.querySelector("table");

    data.forEach(app => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${app.full_name}</td>
        <td>${app.email}</td>
        <td>${app.motivation}</td>
      `;
      table.appendChild(row);
    });
  };
</script>

<footer>
  © 2026 Up N Atom – Bewerbungsportal
</footer>

</body>
</html>
